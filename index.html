<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine erste Webseite</title>
    <style>
        /* Elegant Dark Style */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1e1e1e;  /* Dunkler Hintergrund */
            color: #f5f5f5;            /* Heller Text für gute Lesbarkeit */
            text-align: center;
            padding: 50px;
            line-height: 1.6;
        }
        h1 {
            color: #00bfff;  /* Elegant in hellblau */
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            color: #cccccc;  /* etwas dezenter Text */
        }
        img {
            width: 150px;
            border-radius: 50%;
            margin-top: 20px;
            border: 2px solid #00bfff;
        }
        a {
            color: #00bfff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Hallo, ich bin Jada Cassandra Tsakalofidou.</h1>
    <p>Willkommen auf meiner ersten Webseite.</p>
    <p>Mehr über mich: <a href="https://example.com" target="_blank">Hier klicken</a></p>
</body>
</html>
